version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /part-1-agent
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /agent-1-ecosystem-radar
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      npm-dependencies:
        patterns:
          - "*"
